models:
  'qwen-3.6-35B-A3B':
    proxy: 'http://127.0.0.1:8012'
    name: 'Qwen 3.6 35B A3B'
    cmd: |
      llama-server
      --host 127.0.0.1
      --port 8012
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M
      --ctx-size 131072
      --temp 0.6
      --min-p 0.0
      --top-p 0.95
      --top-k 20
      --repeat-penalty 1.0
      --presence-penalty 0.0
      --flash-attn on
      --reasoning-budget 4096
      --reasoning-budget-message "Proceed to final answer."
      --fit on
      --fit-target 128
      --no-mmproj-offload
      --jinja
  'gemma-4-26B-A4B':
    proxy: 'http://127.0.0.1:8012'
    name: 'Gemma 4 26B A4B'
    cmd: |
      llama-server
      --host 127.0.0.1
      --port 8012
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q4_K_M
      --ctx-size 131072
      --temp 1.0
      --min-p 0.0
      --top-p 0.95
      --top-k 64
      --repeat-penalty 1.0
      --presence-penalty 0.0
      --flash-attn on
      --reasoning-budget 4096
      --reasoning-budget-message "Proceed to final answer."
      --fit on
      --fit-target 128
      --no-mmap
      --jinja
  'gpt-oss-20B':
    proxy: 'http://127.0.0.1:8012'
    name: 'GPT OSS 20B'
    cmd: |
      llama-server
      --host 127.0.0.1
      --port 8012
      -hf unsloth/gpt-oss-20b-GGUF:UD-Q4_K_XL
      --ctx-size 131072
      --temp 1.0
      --min-p 0.0
      --top-p 1.0
      --top-k 0
      --flash-attn on
      --fit on
      --fit-target 128
      --no-mmap
      --jinja
  'qwen-2.5-coder-1.5B-Instruct':
    proxy: 'http://127.0.0.1:8013'
    name: 'Qwen 2.5 Coder 1.5B (128K)'
    cmd: |
      llama-server
      --host 127.0.0.1
      --port 8013
      -hf unsloth/Qwen2.5-Coder-1.5B-Instruct-128K-GGUF:Q6_K
      --temp 0.7 
      --min-p 0.0 
      --top-p 0.8 
      --top-k 20 
      --repeat-penalty 1.05
      --jinja
  'comfyui':
    proxy: 'http://127.0.0.1:8188'
    name: 'ComfyUI'
    checkEndpoint: /models
    cmd: |
      comfyui
      --listen 127.0.0.1
      --port 8188
  'whisper':
    proxy: 'http://127.0.0.1:9090'
    checkEndpoint: /v1/audio/transcriptions/
    cmd: |
      /opt/homebrew/bin/whisper-server
      --host 127.0.0.1
      --port 9090
      --flash-attn
      --request-path /v1/audio/transcriptions --inference-path ""
matrix:
  vars:
    q36: qwen-3.6-35B-A3B
    g4: gemma-4-26B-A4B
    g20: gpt-oss-20B
    c15: qwen-2.5-coder-1.5B-Instruct
    cui: comfyui
  sets:
    coder: 'c15 & (q36 | g4 | g20)'
    creative: 'cui & (q36 | g4)'
